name: "[./.github/workflows/travis-publish-third-party.yaml]"

on:
  workflow_call:
    inputs:
      tag:
        description: "The tag of the release to publish"
        type: string
        required: true
        default: 2025.03.0
      IS_STABLE_RELEASE:
        required: true
        default: false
        type: boolean
    secrets:
      BOT_TOKEN:
        required: true
        description: "The token used to authenticate to the Github API"

run-name: Auto publishing ${{ inputs.tag }} to external stores

jobs:
  get-tag-info:
    runs-on: ubuntu-latest
    name: Get tag info рЯПЈпЄП

    outputs:
      commit_hash: ${{ steps.tag_data.outputs.commit_hash }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          ref: ${{ inputs.tag }}

      - name: Get tag data
        id: tag_data
        run: |
          echo "commit_hash=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

  #
  # вЦИвЦИвЦИвЦИвЦИвЦИвХЧ вЦИвЦИвЦИвЦИвЦИвЦИвЦИвХЧвЦИвЦИвХЧ     вЦИвЦИвЦИвЦИвЦИвЦИвЦИвХЧ вЦИвЦИвЦИвЦИвЦИвХЧ вЦИвЦИвЦИвЦИвЦИвЦИвЦИвХЧвЦИвЦИвЦИвЦИвЦИвЦИвЦИвХЧ
  # вЦИвЦИвХФвХРвХРвЦИвЦИвХЧвЦИвЦИвХФвХРвХРвХРвХРвХЭвЦИвЦИвХС     вЦИвЦИвХФвХРвХРвХРвХРвХЭвЦИвЦИвХФвХРвХРвЦИвЦИвХЧвЦИвЦИвХФвХРвХРвХРвХРвХЭвЦИвЦИвХФвХРвХРвХРвХРвХЭ
  # вЦИвЦИвЦИвЦИвЦИвЦИвХФвХЭвЦИвЦИвЦИвЦИвЦИвХЧ  вЦИвЦИвХС     вЦИвЦИвЦИвЦИвЦИвХЧ  вЦИвЦИвЦИвЦИвЦИвЦИвЦИвХСвЦИвЦИвЦИвЦИвЦИвЦИвЦИвХЧвЦИвЦИвЦИвЦИвЦИвХЧ
  # вЦИвЦИвХФвХРвХРвЦИвЦИвХЧвЦИвЦИвХФвХРвХРвХЭ  вЦИвЦИвХС     вЦИвЦИвХФвХРвХРвХЭ  вЦИвЦИвХФвХРвХРвЦИвЦИвХСвХЪвХРвХРвХРвХРвЦИвЦИвХСвЦИвЦИвХФвХРвХРвХЭ
  # вЦИвЦИвХС  вЦИвЦИвХСвЦИвЦИвЦИвЦИвЦИвЦИвЦИвХЧвЦИвЦИвЦИвЦИвЦИвЦИвЦИвХЧвЦИвЦИвЦИвЦИвЦИвЦИвЦИвХЧвЦИвЦИвХС  вЦИвЦИвХСвЦИвЦИвЦИвЦИвЦИвЦИвЦИвХСвЦИвЦИвЦИвЦИвЦИвЦИвЦИвХЧ
  # вХЪвХРвХЭ  вХЪвХРвХЭвХЪвХРвХРвХРвХРвХРвХРвХЭвХЪвХРвХРвХРвХРвХРвХРвХЭвХЪвХРвХРвХРвХРвХРвХРвХЭвХЪвХРвХЭ  вХЪвХРвХЭвХЪвХРвХРвХРвХРвХРвХРвХЭвХЪвХРвХРвХРвХРвХРвХРвХЭ
  #

  windows:
    needs: get-tag-info
    runs-on: ubuntu-latest
    name: Publish to windows рЯ™Я

    steps:
      - name: Get Previous Release info
        # This version incementation shall be removed when winget-releaser will be able to delete older releases again cf. https://github.com/gama-platform/gama/issues/3917
        if: "${{ !inputs.IS_STABLE_RELEASE }}"
        id: get-prev-release
        run: |
          curl -L -G \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/microsoft/winget-pkgs/contents/manifests/g/GamaPlatform/GamaAlpha" > ${{ runner.temp }}/prev_release.json

            new_version_counter="$(jq -r '.[] | select(.type == "dir") | select(.name | test("^${{ inputs.tag }}-[0-9]+$")) | .name' ${{ runner.temp }}/prev_release.json | cut -d '-' -f 2 | sort -nuz | head -n1)"
            if [ -n "$new_version_counter" ]; then
              new_version_counter=$(($new_version_counter + 1))
            else
              new_version_counter=1
            fi
            echo "new_version_counter=$new_version_counter" >> $GITHUB_OUTPUT

      - name: Publish Stable release to Winget рЯЪА
        if: "${{ inputs.IS_STABLE_RELEASE }}"
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: GamaPlatform.Gama
          version: ${{ inputs.tag }}
          release-tag: ${{ inputs.tag }}
          installers-regex: ^GAMA.+JDK.*\.exe$
          token: ${{ secrets.BOT_TOKEN }}
          fork-user: gama-platform

      - name: Publish Pre release to Winget рЯСЈ
        if: "${{ !inputs.IS_STABLE_RELEASE }}"
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: GamaPlatform.GamaAlpha
          version: ${{ inputs.tag }}-${{ steps.get-prev-release.outputs.new_version_counter }}
          release-tag: ${{ inputs.tag }}
          installers-regex: ^GAMA.+JDK.*\.exe$
          token: ${{ secrets.BOT_TOKEN }}
          max-versions-to-keep: 1
          fork-user: gama-platform

      - name: Get PR created for the release
        id: get-pr
        run: |
          # Add delay to let the PR being opened and API to update
          sleep 10
          #  
          curl -G \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.BOT_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --data-urlencode "q=is:pr author:gama-bot state:open repo:microsoft/winget-pkgs sort:created-desc" \
            "https://api.github.com/search/issues?sort=created&order=desc&per_page=1" | tee ${{ runner.temp }}/pr.json
          #
          echo "number=$(jq -r '.items[0].number' ${{ runner.temp }}/pr.json)" >> $GITHUB_OUTPUT

      - name: Mention developpers
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.BOT_TOKEN}}
          script: |
            const is_pre_release = ${{ !inputs.IS_STABLE_RELEASE }}

            await github.rest.issues.createComment({
              issue_number: ${{ steps.get-pr.outputs.number }},
              owner: "microsoft",
              repo: "winget-pkgs",
              body: 'Poke :point_right: @${{ github.triggering_actor }} @lesquoyb @RoiArthurB'
            })

            await core.summary
              .addHeading(
                `Release ${{ inputs.tag }}${is_pre_release ? "-${{ steps.get-prev-release.outputs.new_version_counter }} alpha (with hash ${{needs.get-tag-info.outputs.commit_hash }})" : ""} published to Winget рЯЪА`
              )
              .addLink("Link to the Winget PR", "https://github.com/microsoft/winget-pkgs/pull/${{ steps.get-pr.outputs.number }}")
              .write()

  docker:
    needs: get-tag-info
    runs-on: ubuntu-latest
    name: Publish pre-release as container рЯР≥

    steps:
      - name: Publish Gama to Github Packages рЯЪА
        run: |
          curl --request POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.BOT_TOKEN }}" \
            --data '{"event_type": "automated-generation"}' \
            https://api.github.com/repos/gama-platform/gama.docker/dispatches

  linux-debian:
    needs: get-tag-info
    runs-on: ubuntu-latest
    name: Publish to PPA/Debian repo рЯРІ рЯЯ†рЯФі

    steps:
      - name: Publish Gama to https://ppa.gama-platform.org рЯЪА
        run: |
          curl -L --fail-with-body \
            --request POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.BOT_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --data '{"ref": "main", "inputs": {"tag": "${{ inputs.tag }}"}}' \
            https://api.github.com/repos/gama-platform/gama.ppa/actions/workflows/69865833/dispatches


  prism-gaml:
    needs: get-tag-info
    runs-on: ubuntu-latest
    name: Publish to npm рЯУ¶

    steps:
      - name: Push prism-gaml.js to prism-gaml repository
        run: |
          NPM_TAG="${{ inputs.tag }}${{ inputs.IS_STABLE_RELEASE && '' || '-alpha' }}"
          git clone --depth 1 https://gama-bot:$BOT_TOKEN@github.com/gama-platform/prism-gaml.git $GITHUB_WORKSPACE/../prism-gaml
          cd $GITHUB_WORKSPACE/../prism-gaml
          git config user.email "my.gama.bot@gmail.com"
          git config user.name "GAMA Bot"
          npm run tagVersion "$NPM_TAG"
          git add -A
          git commit -m "Push new npm release - $NPM_TAG"
          git push
          git tag "$NPM_TAG"
          git push --tags
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

  # linux-arch:
  #   needs: get-tag-info
  #   runs-on: ubuntu-latest
  #   name: Publish to AUR рЯРІ рЯФЈ

  # macos:
